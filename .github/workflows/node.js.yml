name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check
        run: npm run check

      - name: Failover e2e
        run: npm run test:failover

      - name: Usage estimate e2e
        run: npm run test:usage-estimate

      - name: Outbound proxy e2e
        run: npm run test:outbound-proxy

      - name: Sticky routing e2e
        run: npm run test:sticky-routing
